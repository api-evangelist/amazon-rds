name: Amazon RDS
description: >-
  Amazon Relational Database Service (RDS) makes it easy to set up, operate, and scale a relational database in the
  cloud, providing cost-efficient and resizable capacity while automating time-consuming administration tasks such as
  hardware provisioning, database setup, patching, and backups.
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
