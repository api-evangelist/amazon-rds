modified: '2026-04-19'
apis:
- name: Amazon RDS API
  description: >-
    Core API for managing Amazon RDS database instances, clusters, snapshots,
    parameter groups, subnet groups, and other relational database resources
    across multiple database engines including MySQL, PostgreSQL, MariaDB,
    Oracle, SQL Server, and Amazon Aurora.
