created: '2024-01-15'
modified: '2026-05-19'
apis:
  - name: Amazon RDS API
    description: >-
      Core API for managing Amazon RDS database instances, clusters, snapshots, parameter groups, subnet groups, and
      other relational database resources across multiple database engines including MySQL, PostgreSQL, MariaDB, Oracle,
      SQL Server, and Amazon Aurora.
    image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
    humanURL: https://aws.amazon.com/rds/
    baseURL: https://rds.amazonaws.com
    tags:
      - AWS
      - Cloud Databases
      - Databases
      - Managed Databases
      - Relational Databases
