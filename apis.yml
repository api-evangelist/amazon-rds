name: Amazon RDS API
description: Amazon Relational Database Service (RDS) makes it easy to set up, operate, and scale a relational database in the cloud, providing cost-efficient and resizable capacity while automating time-consuming administration tasks such as hardware provisioning, database setup, patching, and backups.
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
url: https://aws.amazon.com/rds/
created: '2024-01-15'
modified: '2026-03-16'
apis:
- name: Amazon RDS API
  description: >-
    Core API for managing Amazon RDS database instances, clusters, snapshots,
    parameter groups, subnet groups, and other relational database resources
    across multiple database engines including MySQL, PostgreSQL, MariaDB,
    Oracle, SQL Server, and Amazon Aurora.
